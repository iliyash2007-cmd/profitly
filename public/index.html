<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Profitly</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.2s, color 0.2s, border-color 0.2s; }
        body {
            font-family: 'Rubik', sans-serif;
            background-color: #0f0f12;
            color: #ededee;
            padding-bottom: 80px;
        }
        body.light {
            background-color: #eef2f5;
            color: #1a1a2e;
        }
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background-color: #1a1a20;
            border-bottom: 1px solid #2a2a30;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        body.light .app-header {
            background-color: #ffffff;
            border-bottom-color: #d4d8dd;
        }
        .app-header h1 { font-size: 22px; font-weight: 600; }
        .header-actions { display: flex; gap: 8px; }
        .icon-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            width: auto;
            margin: 0;
            padding: 8px;
            border-radius: 10px;
        }
        body.dark .icon-btn:hover { background-color: #2a2a30; }
        body.light .icon-btn:hover { background-color: #eef2f5; }
        .main-content { padding: 16px; min-height: calc(100vh - 140px); }
        .card {
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            background-color: #1a1a20;
            border: 1px solid #2a2a30;
        }
        body.light .card {
            background-color: #fafbfd;
            border-color: #d4d8dd;
        }
        .income { font-size: 36px; font-weight: 700; color: #10b981; }
        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #2a2a30;
            border-radius: 4px;
            margin: 12px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background-color: #10b981;
            border-radius: 4px;
            transition: width 0.3s;
        }
        .warning-text { color: #f59e0b; font-size: 14px; margin-top: 8px; }
        .ai-note {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #2a2a30;
        }
        body.light .ai-note { border-top-color: #e0e4e8; }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            background-color: #1a1a20;
            border-top: 1px solid #2a2a30;
            padding: 8px 16px;
            justify-content: space-around;
            z-index: 100;
        }
        body.light .bottom-nav {
            background-color: #ffffff;
            border-top-color: #d4d8dd;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 10px;
            font-family: 'Rubik', sans-serif;
            font-size: 12px;
            color: #8b8c9e;
        }
        body.light .nav-item { color: #6b6c7e; }
        .nav-item.active { color: #10b981; }
        .nav-icon { font-size: 22px; }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-overlay.active { display: flex; }
        .modal-window {
            width: 90%;
            max-width: 380px;
            border-radius: 16px;
            padding: 24px;
            background-color: #1a1a20;
            border: 1px solid #2a2a30;
        }
        body.light .modal-window {
            background-color: #ffffff;
            border-color: #d4d8dd;
        }
        .modal-window h3 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
        .modal-window input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-family: 'Rubik', sans-serif;
            font-size: 15px;
            margin-bottom: 20px;
            background-color: #2a2a30;
            border: 1px solid #3a3a40;
            color: #ededee;
        }
        body.light .modal-window input {
            background-color: #ffffff;
            border-color: #d4d8dd;
            color: #1a1a2e;
        }
        .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; }
        .modal-buttons button { width: auto; padding: 10px 20px; margin-top: 0; }
        .btn-cancel {
            background: none;
            border: 1px solid #2a2a30;
            color: #8b8c9e;
        }
        body.light .btn-cancel {
            border-color: #d4d8dd;
            color: #6b6c7e;
        }
        .btn-confirm { background-color: #10b981; color: white; border: none; }
        .btn-danger { background-color: #ef4444; color: white; }
        .notification {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 500;
            z-index: 1100;
            animation: fadeInOut 2s ease;
            background-color: #2a2a30;
            color: #ededee;
        }
        body.light .notification { background-color: #1e1e2a; color: white; }
        .notification.success { border-left: 4px solid #10b981; }
        .notification.error { border-left: 4px solid #ef4444; }
        @keyframes fadeInOut {
            0% { opacity: 0; top: 50px; }
            10% { opacity: 1; top: 70px; }
            90% { opacity: 1; top: 70px; }
            100% { opacity: 0; top: 50px; }
        }
        select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-family: 'Rubik', sans-serif;
            font-size: 15px;
            margin-bottom: 12px;
            background-color: #2a2a30;
            border: 1px solid #3a3a40;
            color: #ededee;
        }
        body.light select {
            background-color: #ffffff;
            border-color: #d4d8dd;
            color: #1a1a2e;
        }
        /* Кнопки в стиле приложения */
        .btn-primary {
            background-color: #10b981;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-family: 'Rubik', sans-serif;
            font-weight: 500;
            font-size: 15px;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            transition: opacity 0.2s;
        }
        .btn-primary:hover {
            opacity: 0.85;
        }
        .btn-secondary {
            background-color: transparent;
            border: 1px solid #10b981;
            color: #10b981;
            border-radius: 10px;
            padding: 12px;
            font-family: 'Rubik', sans-serif;
            font-weight: 500;
            font-size: 15px;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            transition: background-color 0.2s;
        }
        .btn-secondary:hover {
            background-color: rgba(16, 185, 129, 0.1);
        }
        .client-row, .service-row, .operation-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #2a2a30;
        }
        body.light .client-row, body.light .service-row, body.light .operation-row { border-bottom-color: #e0e4e8; }
        .delete-btn, .edit-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            width: auto;
            margin: 0;
            padding: 4px 8px;
        }
        .delete-btn { color: #ef4444; }
        .edit-btn { color: #10b981; }
        .operation-date { font-size: 12px; opacity: 0.7; margin-top: 4px; }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 500;
            margin-left: 8px;
        }
        .badge-master { background-color: #10b98120; color: #10b981; }
        .badge-company { background-color: #3b82f620; color: #3b82f6; }
        .badge-warehouse { background-color: #f59e0b20; color: #f59e0b; }
    </style>
</head>
<body>
    <div class="app-header">
        <h1>Profitly <span id="profileBadge" class="badge badge-master"></span></h1>
        <div class="header-actions">
            <button class="icon-btn" id="themeToggleBtn" onclick="toggleTheme()">🌙</button>
            <button class="icon-btn" onclick="openSettingsModal()">⚙️</button>
        </div>
    </div>

    <div class="main-content" id="mainContent"></div>
    <div class="bottom-nav" id="bottomNav"></div>

    <div id="settingsModal" class="modal-overlay">
        <div class="modal-window">
            <h3>Настройки</h3>
            <label>Профиль деятельности</label>
            <select id="profileSelect" style="width:100%; margin-bottom:20px;">
                <option value="master">Мастер / Самозанятый</option>
                <option value="company">Компания / ИП</option>
                <option value="warehouse">Склад / Производство</option>
            </select>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeSettingsModal()">Отмена</button>
                <button class="btn-confirm" onclick="saveProfile()">Применить</button>
            </div>
        </div>
    </div>

    <div id="inputModal" class="modal-overlay">
        <div class="modal-window">
            <h3 id="inputModalTitle">Введите значение</h3>
            <input type="text" id="inputModalField" placeholder="">
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeInputModal()">Отмена</button>
                <button class="btn-confirm" onclick="confirmInputModal()">ОК</button>
            </div>
        </div>
    </div>

    <div id="confirmModal" class="modal-overlay">
        <div class="modal-window">
            <h3 id="confirmModalTitle">Подтвердите действие</h3>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeConfirmModal()">Нет</button>
                <button class="btn-confirm" onclick="confirmYes()">Да</button>
            </div>
        </div>
    </div>

    <div id="notificationContainer"></div>

    <script>
        let currentProfile = 'master';
        let currentTab = 'dashboard';
        let clients = [], services = [], operations = [], products = [], operationsCount = 0, totalOps = 0;
        
        let inputModalResolve = null;
        let confirmModalResolve = null;

        function showNotification(message, isError = false) {
            const container = document.getElementById('notificationContainer');
            const notif = document.createElement('div');
            notif.className = `notification ${isError ? 'error' : 'success'}`;
            notif.textContent = message;
            container.appendChild(notif);
            setTimeout(() => notif.remove(), 2000);
        }

        function customPrompt(title, placeholder = '') {
            return new Promise((resolve) => {
                inputModalResolve = resolve;
                document.getElementById('inputModalTitle').textContent = title;
                document.getElementById('inputModalField').value = '';
                document.getElementById('inputModalField').placeholder = placeholder;
                document.getElementById('inputModal').classList.add('active');
                document.getElementById('inputModalField').focus();
            });
        }

        function closeInputModal() {
            document.getElementById('inputModal').classList.remove('active');
            if (inputModalResolve) inputModalResolve(null);
            inputModalResolve = null;
        }

        function confirmInputModal() {
            const value = document.getElementById('inputModalField').value;
            document.getElementById('inputModal').classList.remove('active');
            if (inputModalResolve) inputModalResolve(value);
            inputModalResolve = null;
        }

        function customConfirm(title) {
            return new Promise((resolve) => {
                confirmModalResolve = resolve;
                document.getElementById('confirmModalTitle').textContent = title;
                document.getElementById('confirmModal').classList.add('active');
            });
        }

        function closeConfirmModal() {
            document.getElementById('confirmModal').classList.remove('active');
            if (confirmModalResolve) confirmModalResolve(false);
            confirmModalResolve = null;
        }

        function confirmYes() {
            document.getElementById('confirmModal').classList.remove('active');
            if (confirmModalResolve) confirmModalResolve(true);
            confirmModalResolve = null;
        }

        function updateProfileBadge() {
            const badge = document.getElementById('profileBadge');
            const names = { master: 'Мастер', company: 'Компания', warehouse: 'Склад' };
            badge.textContent = names[currentProfile] || '';
            badge.className = `badge badge-${currentProfile}`;
        }

        function getNavItems() {
            const common = [
                { id: 'dashboard', icon: '🏠', label: 'Дашборд' },
                { id: 'add', icon: '➕', label: 'Добавить' },
                { id: 'clients', icon: '👥', label: 'Клиенты' }
            ];
            const profileItems = {
                master: [{ id: 'services', icon: '💅', label: 'Услуги' }, { id: 'operations', icon: '📋', label: 'Операции' }],
                company: [{ id: 'products', icon: '📦', label: 'Товары' }, { id: 'operations', icon: '📋', label: 'Продажи' }],
                warehouse: [{ id: 'products', icon: '📦', label: 'Товары' }, { id: 'inventory', icon: '🏪', label: 'Склад' }, { id: 'operations', icon: '📋', label: 'Операции' }]
            };
            return [...common, ...(profileItems[currentProfile] || [])];
        }

        function renderBottomNav() {
            const navItems = getNavItems();
            document.getElementById('bottomNav').innerHTML = navItems.map(item => `
                <button class="nav-item ${currentTab === item.id ? 'active' : ''}" onclick="switchTab('${item.id}')">
                    <span class="nav-icon">${item.icon}</span>
                    <span>${item.label}</span>
                </button>
            `).join('');
        }

        function switchTab(tabId) {
            currentTab = tabId;
            renderBottomNav();
            loadCurrentTab();
        }

        async function loadCurrentTab() {
            const container = document.getElementById('mainContent');
            switch (currentTab) {
                case 'dashboard': await loadDashboard(container); break;
                case 'add': await loadAddForm(container); break;
                case 'clients': await loadClientsList(container); break;
                case 'services': await loadServicesList(container); break;
                case 'products': await loadProductsList(container); break;
                case 'operations': await loadOperationsList(container); break;
                case 'inventory': await loadInventory(container); break;
                default: await loadDashboard(container);
            }
        }

        async function loadDashboard(container) {
            await loadStats();
            const stats = await fetch('/api/stats').then(r => r.json());
            const remaining = 50 - totalOps;
            const percent = (totalOps / 50) * 100;
            container.innerHTML = `
                <div class="card">
                    <div class="income">${stats.totalIncome.toLocaleString()} ₽</div>
                    <div>доход за месяц</div>
                </div>
                <div class="card">
                    <div style="font-weight:600; margin-bottom:8px;">Осталось операций: ${remaining} / 50</div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${percent}%;"></div></div>
                    ${totalOps >= 45 ? '<div class="warning-text">⚠️ Лимит скоро закончится. Перейдите на Pro</div>' : ''}
                </div>
                <div class="card">
                    <div style="font-weight:600; margin-bottom:12px;">Топ-10 клиентов</div>
                    ${stats.topClients.map(c => `<div>${c.name}: ${c.total.toLocaleString()} ₽ (${c.percent.toFixed(1)}%)</div>`).join('') || 'Нет данных'}
                </div>
                <div class="card">
                    <div style="font-weight:600; margin-bottom:12px;">Напоминания</div>
                    ${stats.reminders.map(r => `<div>⚠️ ${r.name} не был ${r.days} дней</div>`).join('') || 'Все активны'}
                </div>
                <div class="card">
                    <div style="font-weight:600; margin-bottom:12px;">Совет нейросети</div>
                    <div>${stats.aiAdvice}</div>
                    <div class="ai-note">📌 Как работает совет: анализируем время всех операций, находим 2-часовой интервал с наименьшей загрузкой и рекомендуем запустить скидку для новых клиентов.</div>
                </div>
            `;
        }

        async function loadAddForm(container) {
            await loadClientsData();
            let itemsHtml = '';
            if (currentProfile === 'master') {
                await loadServicesData();
                itemsHtml = `
                    <select id="itemSelectAdd">
                        <option value="">-- Выберите услугу --</option>
                        ${services.map(s => `<option value="${s.id}" data-price="${s.price}">${s.name} - ${s.price} ₽</option>`).join('')}
                    </select>
                    <button class="btn-secondary" onclick="openNewServiceModal()">Новая услуга</button>
                `;
            } else {
                await loadProductsData();
                itemsHtml = `
                    <select id="itemSelectAdd">
                        <option value="">-- Выберите товар --</option>
                        ${products.map(p => `<option value="${p.id}" data-price="${p.price}">${p.name} - ${p.price} ₽</option>`).join('')}
                    </select>
                    <button class="btn-secondary" onclick="openNewProductModal()">Новый товар</button>
                `;
            }
            container.innerHTML = `
                <div class="card">
                    <div style="font-weight:600; margin-bottom:12px;">Новая операция</div>
                    <select id="clientSelectAdd">
                        <option value="">-- Выберите клиента --</option>
                        ${clients.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}
                    </select>
                    <button class="btn-secondary" onclick="openNewClientModal()">Новый клиент</button>
                    ${itemsHtml}
                    <button class="btn-primary" onclick="addOperationFromForm()">Сохранить</button>
                </div>
            `;
        }

        async function loadClientsList(container) {
            await loadClientsData();
            container.innerHTML = `<div class="card"><div style="font-weight:600;">Клиенты</div>${clients.map(c => `<div class="client-row"><span>${c.name} (${c.type === 'company' ? 'Компания' : 'Физ. лицо'})</span><button class="delete-btn" onclick="deleteClient(${c.id})">✕</button></div>`).join('')}<button class="btn-primary" onclick="openNewClientModal()">Новый клиент</button></div>`;
        }

        async function loadServicesList(container) {
            await loadServicesData();
            container.innerHTML = `<div class="card"><div style="font-weight:600;">Услуги</div>${services.map(s => `<div class="service-row"><span>${s.name} - ${s.price} ₽</span><button class="delete-btn" onclick="deleteService(${s.id})">✕</button></div>`).join('')}<button class="btn-primary" onclick="openNewServiceModal()">Новая услуга</button></div>`;
        }

        async function loadProductsList(container) {
            await loadProductsData();
            container.innerHTML = `<div class="card"><div style="font-weight:600;">Товары</div>${products.map(p => `<div class="service-row"><span>${p.name} - ${p.price} ₽</span><button class="delete-btn" onclick="deleteProduct(${p.id})">✕</button></div>`).join('')}<button class="btn-primary" onclick="openNewProductModal()">Новый товар</button></div>`;
        }

        async function loadOperationsList(container) {
            await loadOperationsData();
            const remaining = 50 - totalOps;
            const percent = (totalOps / 50) * 100;
            const sorted = [...operations].sort((a, b) => new Date(b.date) - new Date(a.date));
            container.innerHTML = `
                <div class="card">
                    <div style="font-weight:600; margin-bottom:8px;">Осталось операций: ${remaining} / 50</div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${percent}%;"></div></div>
                    ${totalOps >= 45 ? '<div class="warning-text">⚠️ Лимит скоро закончится</div>' : ''}
                </div>
                <div class="card">
                    <div style="font-weight:600; margin-bottom:12px;">История операций</div>
                    ${sorted.map(op => `<div class="operation-row"><div><strong>${op.clientName}</strong> — ${op.serviceName || op.productName}<div>${op.amount.toLocaleString()} ₽</div><div class="operation-date">${new Date(op.date).toLocaleDateString()}</div></div><div><button class="edit-btn" onclick="editOperation(${op.id})">✎</button><button class="delete-btn" onclick="deleteOperation(${op.id})">✕</button></div></div>`).join('') || 'Нет операций'}
                </div>
            `;
        }

        async function loadInventory(container) {
            await loadProductsData();
            container.innerHTML = `<div class="card"><div style="font-weight:600;">Остатки на складе</div>${products.map(p => `<div class="client-row"><span>${p.name}</span><span>${p.stock || 0} шт.</span></div>`).join('')}</div>`;
        }

        async function loadStats() { const res = await fetch('/api/stats'); const d = await res.json(); totalOps = d.operationsCount; }
        async function loadClientsData() { const res = await fetch('/api/clients'); clients = await res.json(); }
        async function loadServicesData() { const res = await fetch('/api/services'); services = await res.json(); }
        async function loadProductsData() { const res = await fetch('/api/products'); products = await res.json(); }
        async function loadOperationsData() { const res = await fetch('/api/operations'); operations = await res.json(); }

        async function addOperationFromForm() {
            const clientId = document.getElementById('clientSelectAdd').value;
            const itemId = document.getElementById('itemSelectAdd')?.value;
            if (!clientId || !itemId) { showNotification('Выберите клиента и позицию', true); return; }
            const client = clients.find(c => c.id == clientId);
            let item, name, price;
            if (currentProfile === 'master') {
                item = services.find(s => s.id == itemId);
                name = item.name; price = item.price;
            } else {
                item = products.find(p => p.id == itemId);
                name = item.name; price = item.price;
            }
            if (totalOps >= 50) { showNotification('Лимит 50 операций. Перейдите на Pro', true); return; }
            await fetch('/api/operations', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ clientId: client.id, clientName: client.name, serviceId: itemId, serviceName: name, amount: price })
            });
            showNotification('Операция добавлена');
            switchTab('dashboard');
        }

        async function deleteClient(id) { if (await customConfirm('Удалить клиента?')) { await fetch(`/api/clients/${id}`, { method: 'DELETE' }); loadCurrentTab(); showNotification('Клиент удалён'); } }
        async function deleteService(id) { if (await customConfirm('Удалить услугу?')) { await fetch(`/api/services/${id}`, { method: 'DELETE' }); loadCurrentTab(); showNotification('Услуга удалена'); } }
        async function deleteProduct(id) { if (await customConfirm('Удалить товар?')) { await fetch(`/api/products/${id}`, { method: 'DELETE' }); loadCurrentTab(); showNotification('Товар удалён'); } }
        async function deleteOperation(id) { if (await customConfirm('Удалить операцию?')) { await fetch(`/api/operations/${id}`, { method: 'DELETE' }); loadCurrentTab(); showNotification('Операция удалена'); } }
        async function editOperation(id) { const op = operations.find(o => o.id === id); if (!op) return; const newAmount = await customPrompt('Новая сумма:', op.amount.toString()); if (newAmount && !isNaN(parseInt(newAmount))) { await fetch(`/api/operations/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ...op, amount: parseInt(newAmount) }) }); loadCurrentTab(); showNotification('Операция обновлена'); } }

        async function openNewClientModal() { const name = await customPrompt('Имя клиента'); if (!name) return; const isCompany = await customConfirm('Это компания?'); const type = isCompany ? 'company' : 'person'; await fetch('/api/clients', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, type }) }); loadCurrentTab(); showNotification('Клиент добавлен'); }
        async function openNewServiceModal() { const name = await customPrompt('Название услуги'); if (!name) return; const priceStr = await customPrompt('Цена (в рублях)'); const price = parseInt(priceStr); if (isNaN(price)) { showNotification('Некорректная цена', true); return; } await fetch('/api/services', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, price }) }); loadCurrentTab(); showNotification('Услуга добавлена'); }
        async function openNewProductModal() { const name = await customPrompt('Название товара'); if (!name) return; const priceStr = await customPrompt('Цена (в рублях)'); const price = parseInt(priceStr); if (isNaN(price)) { showNotification('Некорректная цена', true); return; } await fetch('/api/products', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, price, stock: 0 }) }); loadCurrentTab(); showNotification('Товар добавлен'); }

        function openSettingsModal() { document.getElementById('settingsModal').classList.add('active'); loadSettingsToModal(); }
        function closeSettingsModal() { document.getElementById('settingsModal').classList.remove('active'); }
        async function loadSettingsToModal() { const res = await fetch('/api/settings'); const s = await res.json(); document.getElementById('profileSelect').value = s.role || 'master'; }
        async function saveProfile() { const profile = document.getElementById('profileSelect').value; await fetch('/api/settings', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ role: profile }) }); currentProfile = profile; updateProfileBadge(); closeSettingsModal(); renderBottomNav(); await loadCurrentTab(); showNotification('Профиль изменён'); }

        function toggleTheme() { const isLight = document.body.classList.contains('light'); if (isLight) { document.body.classList.remove('light'); localStorage.setItem('theme', 'dark'); document.getElementById('themeToggleBtn').textContent = '🌙'; } else { document.body.classList.add('light'); localStorage.setItem('theme', 'light'); document.getElementById('themeToggleBtn').textContent = '☀️'; } fetch('/api/settings', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ theme: localStorage.getItem('theme') }) }).catch(console.error); }

        async function init() { const savedTheme = localStorage.getItem('theme'); if (savedTheme === 'light') { document.body.classList.add('light'); document.getElementById('themeToggleBtn').textContent = '☀️'; } const res = await fetch('/api/settings'); const s = await res.json(); currentProfile = s.role || 'master'; updateProfileBadge(); renderBottomNav(); await loadCurrentTab(); }
        init();
    </script>
</body>
</html>
