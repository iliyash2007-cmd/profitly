<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Profitly</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.2s, color 0.2s, border-color 0.2s; }
        body {
            font-family: 'Rubik', sans-serif;
            background-color: #0f0f12;
            color: #ededee;
            padding-bottom: 80px;
        }
        body.light {
            background-color: #eef2f5;

        }
        .app-header {
            display: flex;
            justify-content: space-between;

        }
input[type="text"] {
    background-color: #2a2a30;
    border: 1px solid #3a3a40;
    color: #ededee;
    border-radius: 10px;
    padding: 12px;
    font-family: 'Rubik', sans-serif;
    font-size: 14px;
}

body.light input[type="text"] {
    background-color: #ffffff;
    border-color: #d4d8dd;
    color: #1a1a2e;
}

/* Стили для календаря (date picker) */
input[type="date"] {
    background-color: #2a2a30;
    border: 1px solid #3a3a40;
    color: #ededee;
    border-radius: 10px;
    padding: 10px;

}

    background-color: #ffffff;

/* Кнопки фильтра */

    background-color: transparent;
    border: 1px solid #3a3a40;
    color: #ededee;
    border-radius: 10px;
    padding: 10px;
    font-family: 'Rubik', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
}

body.light .filter-btn {
    border-color: #d4d8dd;
    color: #1a1a2e;
}

.filter-btn.active {
    background-color: #10b981;
    border-color: #10b981;
    color: white;
}

body.light .filter-btn.active {
    background-color: #059669;
    border-color: #059669;
    color: white;
}

.filter-btn:hover:not(.active) {
    background-color: rgba(16, 185, 129, 0.1);
}
.filter-btn.active {
    background-color: #10b981;
    border-color: #10b981;
    color: white;
}
body.light .filter-btn.active {
    background-color: #059669;
    border-color: #059669;
    color: white;
}
        body.light .app-header {
            background-color: #ffffff;
            border-bottom-color: #d4d8dd;
        }
        .app-header h1 { font-size: 22px; font-weight: 600; }
        .header-actions { display: flex; gap: 8px; }
        .icon-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            width: auto;
            margin: 0;
            padding: 8px;
            border-radius: 10px;
        }
        body.dark .icon-btn:hover { background-color: #2a2a30; }
        body.light .icon-btn:hover { background-color: #eef2f5; }
        .main-content { padding: 16px; min-height: calc(100vh - 140px); }
        .card {
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            background-color: #1a1a20;
            border: 1px solid #2a2a30;
        }
        body.light .card {
            background-color: #fafbfd;
            border-color: #d4d8dd;
        }
        .income { font-size: 36px; font-weight: 700; color: #10b981; }
        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #2a2a30;
            border-radius: 4px;
            margin: 12px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background-color: #10b981;
            border-radius: 4px;

        }
        .warning-text { color: #f59e0b; font-size: 14px; margin-top: 8px; }
        .ai-note {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #2a2a30;
        }
        body.light .ai-note { border-top-color: #e0e4e8; }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            background-color: #1a1a20;
            border-top: 1px solid #2a2a30;
            padding: 8px 16px;

        }
        body.light .bottom-nav {
            background-color: #ffffff;

        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px 12px;

        }

        .nav-icon { font-size: 22px; }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-overlay.active { display: flex; }
        .modal-window {
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            border-radius: 16px;
            padding: 24px;
            background-color: #1a1a20;
            border: 1px solid #2a2a30;
        }
        body.light .modal-window {
            background-color: #ffffff;
            border-color: #d4d8dd;
        }
        .modal-window h3 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
        .modal-window label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            opacity: 0.8;
        }
        .modal-window input, .modal-window textarea, .modal-window select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-family: 'Rubik', sans-serif;
            font-size: 15px;
            margin-bottom: 16px;
            background-color: #2a2a30;
            border: 1px solid #3a3a40;
            color: #ededee;
        }
        body.light .modal-window input, body.light .modal-window textarea, body.light .modal-window select {
            background-color: #ffffff;
            border-color: #d4d8dd;
            color: #1a1a2e;
        }
        .modal-window textarea { resize: vertical; }
        .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; margin-top: 8px; }
        .modal-buttons button { width: auto; padding: 10px 20px; margin-top: 0; }
        .btn-cancel {
            background: none;
            border: 1px solid #2a2a30;
            color: #8b8c9e;
        }
        body.light .btn-cancel {
            border-color: #d4d8dd;
            color: #6b6c7e;
        }
        .btn-confirm { background-color: #10b981; color: white; border: none; }
        .btn-danger { background-color: #ef4444; color: white; }
        .notification {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 500;
            z-index: 1100;
            animation: fadeInOut 2s ease;
            background-color: #2a2a30;
            color: #ededee;
        }
        body.light .notification { background-color: #1e1e2a; color: white; }
        .notification.success { border-left: 4px solid #10b981; }
        .notification.error { border-left: 4px solid #ef4444; }
        @keyframes fadeInOut {
            0% { opacity: 0; top: 50px; }
            10% { opacity: 1; top: 70px; }
            90% { opacity: 1; top: 70px; }
            100% { opacity: 0; top: 50px; }
        }
        select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-family: 'Rubik', sans-serif;
            font-size: 15px;
            margin-bottom: 12px;
            background-color: #2a2a30;
            border: 1px solid #3a3a40;
            color: #ededee;
        }
        body.light select {
            background-color: #ffffff;
            border-color: #d4d8dd;
            color: #1a1a2e;
        }
        .btn-primary {
            background-color: #10b981;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-family: 'Rubik', sans-serif;
            font-weight: 500;
            font-size: 15px;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            transition: opacity 0.2s;
        }
        .btn-primary:hover { opacity: 0.85; }
        .btn-secondary {
            background-color: transparent;
            border: 1px solid #10b981;
            color: #10b981;
            border-radius: 10px;
            padding: 12px;
            font-family: 'Rubik', sans-serif;
            font-weight: 500;
            font-size: 15px;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            transition: background-color 0.2s;
        }
        .btn-secondary:hover { background-color: rgba(16, 185, 129, 0.1); }
        .client-row, .service-row, .operation-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #2a2a30;
        }
        body.light .client-row, body.light .service-row, body.light .operation-row { border-bottom-color: #e0e4e8; }
        .delete-btn, .edit-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            width: auto;
            margin: 0;
            padding: 4px 8px;
        }
        .delete-btn { color: #ef4444; }
        .edit-btn { color: #10b981; }
        .operation-date { font-size: 12px; opacity: 0.7; margin-top: 4px; }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 500;
            margin-left: 8px;
        }
        .badge-master { background-color: #10b98120; color: #10b981; }
        .badge-company { background-color: #3b82f620; color: #3b82f6; }
        .badge-warehouse { background-color: #f59e0b20; color: #f59e0b; }
        .client-info {
            flex: 1;
        }
        .client-phone, .client-notes {
            font-size: 12px;
            opacity: 0.7;

        }

            flex: 1;
        }

            font-size: 13px;

        }
        .section-title {
            font-weight: 600;
            margin-bottom: 16px;
            font-size: 16px;

.status-badge {

    border: 1px solid #3a3a40;
    color: #ededee;
}

    background-color: #ffffff;

    color: #1a1a2e;
}

.filter-status-btn.active {

<body>
    <div class="app-header">
        <h1>Profitly <span id="profileBadge" class="badge badge-master"></span></h1>
        <div class="header-actions">
            <button class="icon-btn" id="themeToggleBtn" onclick="toggleTheme()">🌙</button>
            <button class="icon-btn" onclick="openSettingsModal()">⚙️</button>
        </div>
    </div>

    <div class="main-content" id="mainContent"></div>
    <div class="bottom-nav" id="bottomNav"></div>

    <!-- Настройки -->
   <div id="settingsModal" class="modal-overlay">
    <div class="modal-window">
        <h3>Настройки</h3>
        <div class="settings-section">
            <h4>Профиль деятельности</h4>
            <select id="profileSelect" style="width:100%; margin-bottom:20px;">
                <option value="master">Мастер / Самозанятый</option>
                <option value="company">Компания / ИП</option>
                <option value="warehouse">Склад / Производство</option>
            </select>
        </div>
        <div class="settings-section">
            <h4>Валюта</h4>
            <select id="currencySelect" style="width:100%; margin-bottom:20px;">
                <option value="RUB">₽ Российский рубль</option>
                <option value="USD">$ Доллар США</option>
                <option value="EUR">€ Евро</option>
                <option value="BYN">Br Белорусский рубль</option>
            </select>
        </div>
        <div class="modal-buttons">
            <button class="btn-cancel" onclick="closeSettingsModal()">Отмена</button>
            <button class="btn-confirm" onclick="saveSettings()">Применить</button>
        </div>
    </div>
</div>

    <!-- Универсальное модальное окно -->
    <div id="dynamicModal" class="modal-overlay">
        <div class="modal-window">
            <h3 id="dynamicModalTitle">Введите значение</h3>
            <div id="dynamicModalBody"></div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeDynamicModal()">Отмена</button>
                <button class="btn-confirm" onclick="confirmDynamicModal()">Подтвердить</button>
            </div>
        </div>
    </div>

    <div id="notificationContainer"></div>

    <script>
        let currentProfile = 'master';
        let currentTab = 'dashboard';
        let clients = [], services = [], operations = [], products = [], operationsCount = 0, totalOps = 0;
        
        let dynamicModalResolve = null;

        function showNotification(message, isError = false) {
            const container = document.getElementById('notificationContainer');
            const notif = document.createElement('div');
            notif.className = `notification ${isError ? 'error' : 'success'}`;
            notif.textContent = message;
            container.appendChild(notif);
            setTimeout(() => notif.remove(), 2000);
        }

        function openModal(title, bodyHtml, callback) {
            document.getElementById('dynamicModalTitle').textContent = title;
            document.getElementById('dynamicModalBody').innerHTML = bodyHtml;
            dynamicModalResolve = callback;
            document.getElementById('dynamicModal').classList.add('active');
        }

        function closeDynamicModal() {
            document.getElementById('dynamicModal').classList.remove('active');
            dynamicModalResolve = null;
        }

        function confirmDynamicModal() {
            if (dynamicModalResolve) dynamicModalResolve();
            closeDynamicModal();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function updateProfileBadge() {
            const badge = document.getElementById('profileBadge');
            const names = { master: 'Мастер', company: 'Компания', warehouse: 'Склад' };
            badge.textContent = names[currentProfile] || '';
            badge.className = `badge badge-${currentProfile}`;
        }

        function getNavItems() {
            const common = [
                { id: 'dashboard', icon: '🏠', label: 'Дашборд' },
                { id: 'add', icon: '➕', label: 'Добавить' },
                { id: 'clients', icon: '👥', label: 'Клиенты' }
            ];
            const profileItems = {
                master: [{ id: 'services', icon: '💅', label: 'Услуги' }, { id: 'operations', icon: '📋', label: 'Операции' }],
                company: [{ id: 'products', icon: '📦', label: 'Товары' }, { id: 'operations', icon: '📋', label: 'Продажи' }],
                warehouse: [{ id: 'products', icon: '📦', label: 'Товары' }, { id: 'inventory', icon: '🏪', label: 'Склад' }, { id: 'operations', icon: '📋', label: 'Операции' }]
            };
            return [...common, ...(profileItems[currentProfile] || [])];
        }

        function renderBottomNav() {
            const navItems = getNavItems();
            document.getElementById('bottomNav').innerHTML = navItems.map(item => `
                <button class="nav-item ${currentTab === item.id ? 'active' : ''}" onclick="switchTab('${item.id}')">
                    <span class="nav-icon">${item.icon}</span>
                    <span>${item.label}</span>
                </button>
            `).join('');
        }

        function switchTab(tabId) {
            currentTab = tabId;
            renderBottomNav();
            loadCurrentTab();
        }

        async function loadCurrentTab() {
            const container = document.getElementById('mainContent');
            switch (currentTab) {
                case 'dashboard': await loadDashboard(container); break;
                case 'add': await loadAddForm(container); break;
                case 'clients': await loadClientsList(container); break;
                case 'services': await loadServicesList(container); break;
                case 'products': await loadProductsList(container); break;
                case 'operations': await loadOperationsList(container); break;
                case 'inventory': await loadInventory(container); break;
                default: await loadDashboard(container);
            }
        }

        async function loadDashboard(container) {
    await loadStats();
    const stats = await fetch('/api/stats').then(r => r.json());
    const remaining = 50 - totalOps;
    const percent = (totalOps / 50) * 100;
    container.innerHTML = `
        <div class="card">
            <div class="income">${formatPrice(stats.totalIncome)}</div>
            <div>доход за месяц</div>
        </div>
                <div class="card">
                    <div style="font-weight:600; margin-bottom:8px;">Осталось операций: ${remaining} / 50</div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${percent}%;"></div></div>
                    ${totalOps >= 45 ? '<div class="warning-text">⚠️ Лимит скоро закончится. Перейдите на Pro</div>' : ''}
                </div>
                <div class="card">
                    <div class="section-title">Топ-10 клиентов</div>
                    ${stats.topClients.map(c => `<div><strong>${escapeHtml(c.name)}</strong>: ${c.total.toLocaleString()} ₽ (${c.percent.toFixed(1)}%)</div>`).join('') || 'Нет данных'}
                </div>
                <div class="card">
                    <div class="section-title">Напоминания</div>
                    ${stats.reminders.map(r => `<div>⚠️ ${escapeHtml(r.name)} не был ${r.days} дней</div>`).join('') || 'Все активны'}
                </div>
                <div class="card">
                    <div class="section-title">Совет нейросети</div>
                    <div>${stats.aiAdvice}</div>
                    <div class="ai-note">📌 Как работает совет: анализируем время всех операций, находим 2-часовой интервал с наименьшей загрузкой и рекомендуем запустить скидку для новых клиентов.</div>
                </div>
            `;
        }

async function loadProductsList(container) {
    await loadProductsData();
    
    let searchTerm = '';
    
    function filterProducts() {
        if (!searchTerm) return products;
        const term = searchTerm.toLowerCase();
        return products.filter(p => p.name.toLowerCase().includes(term));
    }
    
    function renderProductsList() {
        const filtered = filterProducts();
        const listContainer = document.getElementById('productsListContainer');
        if (listContainer) {
            if (filtered.length === 0) {
                listContainer.innerHTML = '<div style="text-align:center; padding:20px;">🔍 Товары не найдены</div>';
            } else {
                listContainer.innerHTML = filtered.map(p => `
                    <div class="service-row">
                        <div class="service-info">
                            <div><strong>${escapeHtml(p.name)}</strong></div>
                            <div class="service-price">💰 ${formatPrice(p.price)}</div>
                            ${p.stock !== undefined ? `<div class="service-price">📦 Остаток: ${p.stock} шт.</div>` : ''}
                        </div>
                        <div>
                            <button class="edit-btn" onclick="editProduct(${p.id})">✎</button>
                            <button class="delete-btn" onclick="deleteProduct(${p.id})">✕</button>
                        </div>
                    </div>
                `).join('');
            }
        }
    }
    
    container.innerHTML = `
        <div class="card">
            <div class="section-title">Товары</div>
            <input type="text" id="productSearchInput" placeholder="🔍 Поиск по названию..." style="width:100%; padding: 12px; border-radius: 10px; font-family: 'Rubik', sans-serif; font-size: 14px; margin-bottom: 16px;">
            <div id="productsListContainer"></div>
            <button class="btn-primary" onclick="openNewProductModal()" style="margin-top: 16px;">Новый товар</button>
        </div>
    `;
    
    const searchInput = document.getElementById('productSearchInput');
    searchInput.addEventListener('input', (e) => {
        searchTerm = e.target.value;
        renderProductsList();
    });
    
    renderProductsList();
}

        async function loadAddForm(container) {
            await loadClientsData();
            let itemsHtml = '';
            if (currentProfile === 'master') {
                await loadServicesData();
                itemsHtml = `
                    <select id="itemSelectAdd">
                        <option value="">-- Выберите услугу --</option>
                        ${services.map(s => `<option value="${s.id}" data-price="${s.price}">${escapeHtml(s.name)} - ${formatPrice(s.price)}</option>`).join('')}
                    </select>
                    <button class="btn-secondary" onclick="openNewServiceModal()">Новая услуга</button>
                `;
            } else {
                await loadProductsData();
                itemsHtml = `
                    <select id="itemSelectAdd">
                        <option value="">-- Выберите товар --</option>
                        ${products.map(p => `<option value="${p.id}" data-price="${p.price}">${escapeHtml(p.name)} - ${p.price} ₽</option>`).join('')}
                    </select>
                    <button class="btn-secondary" onclick="openNewProductModal()">Новый товар</button>
                `;
            }
            container.innerHTML = `
                <div class="card">
                    <div class="section-title">Новая операция</div>
                    <select id="clientSelectAdd">
                        <option value="">-- Выберите клиента --</option>
                        ${clients.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('')}
                    </select>
                    <button class="btn-secondary" onclick="openNewClientModal()">Новый клиент</button>
                    ${itemsHtml}
                    <button class="btn-primary" onclick="addOperationFromForm()">Сохранить</button>
                </div>
            `;
        }

        async function loadClientsList(container) {
    await loadClientsData();
    
    let searchTerm = '';
    let statusFilter = 'all';

        async function loadOperationsList(container) {
    await loadOperationsData();
    await loadStats();
    
    // Состояние фильтра
    let filterType = 'all'; // all, today, yesterday, week, month, custom
    let customStart = null;
    let customEnd = null;
    
    // Функция фильтрации
    function filterOperations() {
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);
        
        let weekStart = new Date(today);
        const day = weekStart.getDay();
        weekStart.setDate(today.getDate() - (day === 0 ? 6 : day - 1));
        
        const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
        
        return operations.filter(op => {
            const opDate = new Date(op.date);
            
            switch (filterType) {
                case 'today':
                    return opDate >= today;
                case 'yesterday':
                    return opDate >= yesterday && opDate < today;
                case 'week':
                    return opDate >= weekStart;
                case 'month':
                    return opDate >= monthStart;
                case 'custom':
                    if (customStart && opDate < customStart) return false;
                    if (customEnd && opDate > customEnd) return false;
                    return true;
                default:
                    return true;
            }
        });
    }
    
    // Подсчёт суммы за период
    function getFilteredTotal(filteredOps) {
        return filteredOps.reduce((sum, op) => sum + op.amount, 0);
    }
    
    // Рендер списка
    function renderFilteredList() {
        const filtered = filterOperations();
        const total = getFilteredTotal(filtered);
        const sorted = [...filtered].sort((a, b) => new Date(b.date) - new Date(a.date));
        
        const filteredContainer = document.getElementById('filteredOperationsList');
        if (filteredContainer) {
            filteredContainer.innerHTML = sorted.map(op => `
                <div class="operation-row">
                    <div>
                        <div><strong>${escapeHtml(op.clientName)}</strong> — ${escapeHtml(op.serviceName || op.productName)}</div>
                        <div>💰 ${formatPrice(op.amount)}</div>
                        <div class="operation-date">📅 ${new Date(op.date).toLocaleDateString()}</div>
                    </div>
                    <div>
                        <button class="edit-btn" onclick="editOperation(${op.id})">✎</button>
                        <button class="delete-btn" onclick="deleteOperation(${op.id})">✕</button>
                    </div>
                </div>
            `).join('') || '<div style="text-align:center; padding:20px;">Нет операций за выбранный период</div>';
        }
        
        const totalElement = document.getElementById('filteredTotal');
        if (totalElement) {
            totalElement.innerHTML = `💰 ${formatPrice(total)}`;
        }
    }
    
    // Установка фильтра и обновление
    function setFilter(type, start = null, end = null) {
        filterType = type;
        customStart = start;
        customEnd = end;
        
        // Обновляем активный класс кнопок
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.dataset.filter === type) btn.classList.add('active');
        });
        
        renderFilteredList();
    }
    
    // Рендер интерфейса
    const remaining = 50 - totalOps;
    const percent = (totalOps / 50) * 100;
    
    container.innerHTML = `
        <div class="card">
            <div style="font-weight:600; margin-bottom:8px;">Осталось операций: ${remaining} / 50</div>
            <div class="progress-bar"><div class="progress-fill" style="width: ${percent}%;"></div></div>
            ${totalOps >= 45 ? '<div class="warning-text">⚠️ Лимит скоро закончится</div>' : ''}
        </div>
        
        <div class="card">
            <div class="section-title">Фильтр по дате</div>
            <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;">
                <button class="filter-btn" data-filter="all" style="flex:1; margin:0;">Все</button>
                <button class="filter-btn" data-filter="today" style="flex:1; margin:0;">Сегодня</button>
                <button class="filter-btn" data-filter="yesterday" style="flex:1; margin:0;">Вчера</button>
                <button class="filter-btn" data-filter="week" style="flex:1; margin:0;">Эта неделя</button>
                <button class="filter-btn" data-filter="month" style="flex:1; margin:0;">Этот месяц</button>
            </div>
            <div style="display: flex; gap: 12px; align-items: flex-end;">
                <div style="flex:1;">
                    <label style="font-size: 12px; opacity: 0.7; margin-bottom: 4px; display: block;">С</label>
                    <input type="date" id="customStartDate" style="width:100%; padding: 10px; border-radius: 10px; font-family: 'Rubik', sans-serif; font-size: 14px; background-color: #2a2a30; border: 1px solid #3a3a40; color: #ededee;">
                </div>
                <div style="flex:1;">
                    <label style="font-size: 12px; opacity: 0.7; margin-bottom: 4px; display: block;">По</label>
                    <input type="date" id="customEndDate" style="width:100%; padding: 10px; border-radius: 10px; font-family: 'Rubik', sans-serif; font-size: 14px; background-color: #2a2a30; border: 1px solid #3a3a40; color: #ededee;">
                </div>
                <button id="applyCustomBtn" class="btn-secondary" style="flex:0; margin:0; padding: 10px 20px;">Применить</button>
            </div>
        </div>
        
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <div class="section-title" style="margin-bottom:0;">История операций</div>
                <div style="font-size: 18px; font-weight: 700; color: #10b981;" id="filteredTotal">0 ₽</div>
            </div>
            <div id="filteredOperationsList"></div>
        </div>
    `;
    
    // Навешиваем обработчики
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.onclick = () => setFilter(btn.dataset.filter);
    });
    
    document.getElementById('applyCustomBtn').onclick = () => {
        const startDate = document.getElementById('customStartDate').value;
        const endDate = document.getElementById('customEndDate').value;
        setFilter('custom', startDate ? new Date(startDate) : null, endDate ? new Date(endDate + 'T23:59:59') : null);
    };
    
    // Применяем стили к календарям под текущую тему
    function updateCalendarStyles() {
        const isLight = document.body.classList.contains('light');
        const startInput = document.getElementById('customStartDate');
        const endInput = document.getElementById('customEndDate');
        if (startInput) {
            startInput.style.backgroundColor = isLight ? '#ffffff' : '#2a2a30';
            startInput.style.borderColor = isLight ? '#d4d8dd' : '#3a3a40';
            startInput.style.color = isLight ? '#1a1a2e' : '#ededee';
        }
        if (endInput) {
            endInput.style.backgroundColor = isLight ? '#ffffff' : '#2a2a30';
            endInput.style.borderColor = isLight ? '#d4d8dd' : '#3a3a40';
            endInput.style.color = isLight ? '#1a1a2e' : '#ededee';
        }
    }
    
    // Следим за сменой темы
    const observer = new MutationObserver(() => updateCalendarStyles());
    observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });
    
    // Загружаем курсы валют и рендерим
    if (typeof loadCurrencyRates === 'function') await loadCurrencyRates();
    updateCalendarStyles();
    setFilter('all');
}

let currentCurrency = 'RUB';
let currencyRates = { RUB: 1, USD: 0, EUR: 0, BYN: 0 };

// Загрузка курсов валют
async function loadCurrencyRates() {
    try {
        const res = await fetch('/api/currency/rates');
        const data = await res.json();
        currencyRates = data;
    } catch (error) {
        console.error('Ошибка загрузки курсов:', error);
    }
}

// Конвертация цены в выбранную валюту
function convertPrice(priceInRUB) {
    const rate = currencyRates[currentCurrency];
    if (!rate || rate === 0) return priceInRUB;
    return Math.round(priceInRUB * rate);
}

// Форматирование цены с символом валюты
function formatPrice(priceInRUB) {
    const converted = convertPrice(priceInRUB);
    const symbols = { RUB: '₽', USD: '$', EUR: '€', BYN: 'Br' };
    return `${converted.toLocaleString()} ${symbols[currentCurrency]}`;
}

// Сохранение настроек (профиль + валюта)
async function saveSettings() {
    const profile = document.getElementById('profileSelect').value;
    const currency = document.getElementById('currencySelect').value;
    
    await fetch('/api/settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ role: profile, currency: currency })
    });
    
    currentProfile = profile;
    currentCurrency = currency;
    localStorage.setItem('currency', currency);
    updateProfileBadge();
    closeSettingsModal();
    renderBottomNav();
    await loadCurrentTab(); // Перезагружаем все цены
    showNotification('Настройки сохранены');
}

// Обновлённая функция загрузки настроек в модальное окно
async function loadSettingsToModal() {
    const res = await fetch('/api/settings');
    const s = await res.json();
    document.getElementById('profileSelect').value = s.role || 'master';
    document.getElementById('currencySelect').value = s.currency || 'RUB';
}

        function toggleTheme() {
            const isLight = document.body.classList.contains('light');
            if (isLight) {
                document.body.classList.remove('light');
                localStorage.setItem('theme', 'dark');
                document.getElementById('themeToggleBtn').textContent = '🌙';
            } else {
                document.body.classList.add('light');
                localStorage.setItem('theme', 'light');
                document.getElementById('themeToggleBtn').textContent = '☀️';
            }
            fetch('/api/settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ theme: localStorage.getItem('theme') })
            }).catch(console.error);
        }

        async function init() {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light') {
        document.body.classList.add('light');
        document.getElementById('themeToggleBtn').textContent = '☀️';
    }
    
    // Загружаем курсы валют
    await loadCurrencyRates();
    
    const res = await fetch('/api/settings');
    const s = await res.json();
    currentProfile = s.role || 'master';
    currentCurrency = s.currency || 'RUB';
    updateProfileBadge();
    renderBottomNav();
    await loadCurrentTab();
}
