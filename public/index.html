<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Profitly</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.2s, color 0.2s, border-color 0.2s; }

        body {
            font-family: 'Rubik', sans-serif;
            background-color: #0f0f12;
            color: #ededee;
            padding-bottom: 0;
            overflow-x: hidden;
        }
        body.light {
            background-color: #eef2f5;
            color: #1a1a2e;
        }

        /* ========== ШАПКА ========== */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background-color: #1a1a20;
            border-bottom: 1px solid #2a2a30;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        body.light .app-header {
            background-color: #ffffff;
            border-bottom-color: #d4d8dd;
        }
        .menu-toggle {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #ededee;
            width: auto;
            margin: 0;
            padding: 0;
        }
        body.light .menu-toggle {
            color: #1a1a2e;
        }
        .logo {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        body.light .logo {
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            -webkit-background-clip: text;
            background-clip: text;
        }
        .header-actions {
            display: flex;
            gap: 12px;
        }
        .icon-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            width: auto;
            margin: 0;
            padding: 0;
            color: #ededee;
        }
        body.light .icon-btn {
            color: #1a1a2e;
        }

        /* ========== БОКОВОЕ МЕНЮ ========== */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background-color: #1a1a20;
            border-right: 1px solid #2a2a30;
            z-index: 200;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }
        body.light .sidebar {
            background-color: #ffffff;
            border-right-color: #d4d8dd;
        }
        .sidebar.open {
            left: 0;
        }
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 199;
            display: none;
        }
        .sidebar-overlay.open {
            display: block;
        }
        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 24px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-size: 16px;
            font-weight: 500;
        }
        .sidebar-item:hover {
            background-color: rgba(16, 185, 129, 0.1);
        }
        .sidebar-item.active {
            background-color: rgba(16, 185, 129, 0.2);
            border-right: 3px solid #10b981;
            color: #10b981;
        }
        .sidebar-icon {
            font-size: 22px;
            width: 28px;
        }

        /* ========== ОСНОВНОЙ КОНТЕНТ ========== */
        .main-content {
            padding: 20px;
            min-height: calc(100vh - 70px);
        }

        /* ========== КАРТОЧКИ ========== */
        .card {
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            background-color: #1a1a20;
            border: 1px solid #2a2a30;
        }
        body.light .card {
            background-color: #fafbfd;
            border-color: #d4d8dd;
        }
        .section-title {
            font-weight: 600;
            margin-bottom: 16px;
            font-size: 18px;
        }

        /* ========== ДОХОД ========== */
        .income {
            font-size: 36px;
            font-weight: 700;
            color: #10b981;
        }
        body.light .income {
            color: #059669;
        }

        /* ========== ПРОГРЕСС-БАР ========== */
        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #2a2a30;
            border-radius: 4px;
            margin: 12px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background-color: #10b981;
            border-radius: 4px;
            transition: width 0.3s;
        }
        .warning-text {
            color: #f59e0b;
            font-size: 14px;
            margin-top: 8px;
        }

        /* ========== СТАТУСЫ КЛИЕНТОВ ========== */
        .status-badge {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-new { background-color: #3b82f6; }
        .status-negotiation { background-color: #f59e0b; }
        .status-regular { background-color: #10b981; }
        .status-inactive { background-color: #6b7280; }
        .status-departed { background-color: #ef4444; }

        /* ========== КНОПКИ ========== */
        .btn-primary {
            background-color: #10b981;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-family: 'Rubik', sans-serif;
            font-weight: 500;
            font-size: 15px;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            transition: opacity 0.2s;
        }
        .btn-primary:hover { opacity: 0.85; }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid #10b981;
            color: #10b981;
            border-radius: 10px;
            padding: 10px;
            font-family: 'Rubik', sans-serif;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-secondary:hover {
            background-color: rgba(16, 185, 129, 0.1);
        }

        .filter-btn, .filter-status-btn {
            background-color: transparent;
            border: 1px solid #3a3a40;
            color: #ededee;
            border-radius: 10px;
            padding: 8px 12px;
            font-family: 'Rubik', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        body.light .filter-btn, body.light .filter-status-btn {
            border-color: #d4d8dd;
            color: #1a1a2e;
        }
        .filter-btn.active, .filter-status-btn.active {
            background-color: #10b981;
            border-color: #10b981;
            color: white;
        }
        body.light .filter-btn.active, body.light .filter-status-btn.active {
            background-color: #059669;
        }

        /* ========== ПОЛЯ ВВОДА ========== */
        input[type="text"], input[type="number"], input[type="date"], select, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-family: 'Rubik', sans-serif;
            font-size: 14px;
            background-color: #2a2a30;
            border: 1px solid #3a3a40;
            color: #ededee;
        }
        body.light input, body.light select, body.light textarea {
            background-color: #ffffff;
            border-color: #d4d8dd;
            color: #1a1a2e;
        }

        /* ========== СПИСКИ (КЛИЕНТЫ, УСЛУГИ, ОПЕРАЦИИ) ========== */
        .client-row, .service-row, .operation-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #2a2a30;
        }
        body.light .client-row, body.light .service-row, body.light .operation-row {
            border-bottom-color: #e0e4e8;
        }
        .client-info, .service-info {
            flex: 1;
        }
        .client-phone, .client-notes, .service-price {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 4px;
        }
        .delete-btn, .edit-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            width: auto;
            margin: 0;
            padding: 4px 8px;
        }
        .delete-btn { color: #ef4444; }
        .edit-btn { color: #10b981; }
        .operation-date {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 4px;
        }
        .status-select {
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 12px;
            font-family: 'Rubik', sans-serif;
            cursor: pointer;
            background-color: #2a2a30;
            border: 1px solid #3a3a40;
            color: #ededee;
        }
        body.light .status-select {
            background-color: #ffffff;
            border-color: #d4d8dd;
            color: #1a1a2e;
        }

        /* ========== МОДАЛЬНЫЕ ОКНА ========== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-overlay.active { display: flex; }
        .modal-window {
            width: 90%;
            max-width: 450px;
            max-height: 80vh;
            overflow-y: auto;
            border-radius: 16px;
            padding: 24px;
            background-color: #1a1a20;
            border: 1px solid #2a2a30;
        }
        body.light .modal-window {
            background-color: #ffffff;
            border-color: #d4d8dd;
        }
        .modal-window h3 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .modal-window label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            opacity: 0.8;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        .modal-buttons button {
            width: auto;
            padding: 10px 20px;
            margin-top: 0;
        }
        .btn-cancel {
            background: none;
            border: 1px solid #2a2a30;
            color: #8b8c9e;
        }
        body.light .btn-cancel {
            border-color: #d4d8dd;
            color: #6b6c7e;
        }
        .btn-confirm {
            background-color: #10b981;
            color: white;
            border: none;
        }

        /* ========== УВЕДОМЛЕНИЯ ========== */
        .notification {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 500;
            z-index: 1100;
            animation: fadeInOut 2s ease;
            background-color: #2a2a30;
            color: #ededee;
        }
        body.light .notification {
            background-color: #1e1e2a;
            color: white;
        }
        .notification.success { border-left: 4px solid #10b981; }
        .notification.error { border-left: 4px solid #ef4444; }
        @keyframes fadeInOut {
            0% { opacity: 0; top: 60px; }
            10% { opacity: 1; top: 80px; }
            90% { opacity: 1; top: 80px; }
            100% { opacity: 0; top: 60px; }
        }

        /* ========== БЭДЖ ПРОФИЛЯ ========== */
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 500;
            margin-left: 8px;
        }
        .badge-master { background-color: #10b98120; color: #10b981; }
        .badge-company { background-color: #3b82f620; color: #3b82f6; }
        .badge-warehouse { background-color: #f59e0b20; color: #f59e0b; }

        /* ========== AI-СОВЕТ ========== */
        .ai-note {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #2a2a30;
        }
        body.light .ai-note { border-top-color: #e0e4e8; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="app-header">
        <button class="menu-toggle" id="menuToggleBtn">☰</button>
        <div class="logo">Profitly <span id="profileBadge" class="badge badge-master"></span></div>
        <div class="header-actions">
            <button class="icon-btn" id="themeToggleBtn" onclick="toggleTheme()">🌙</button>
            <button class="icon-btn" onclick="openSettingsModal()">⚙️</button>
        </div>
    </div>

    <!-- Боковое меню -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-item" data-tab="dashboard">
            <span class="sidebar-icon">📊</span>
            <span>Дашборд</span>
        </div>
        <div class="sidebar-item" data-tab="add">
            <span class="sidebar-icon">➕</span>
            <span>Быстрая сделка</span>
        </div>
        <div class="sidebar-item" data-tab="clients">
            <span class="sidebar-icon">👥</span>
            <span>Клиенты</span>
        </div>
        <div class="sidebar-item" data-tab="services">
            <span class="sidebar-icon">💅</span>
            <span>Услуги</span>
        </div>
        <div class="sidebar-item" data-tab="operations">
            <span class="sidebar-icon">📋</span>
            <span>Операции</span>
        </div>
        <div class="sidebar-item" data-tab="settings">
            <span class="sidebar-icon">⚙️</span>
            <span>Настройки</span>
        </div>
    </div>

    <div class="main-content" id="mainContent"></div>

    <!-- Настройки -->
    <div id="settingsModal" class="modal-overlay">
        <div class="modal-window">
            <h3>Настройки</h3>
            <div class="settings-section">
                <h4>Профиль деятельности</h4>
                <select id="profileSelect" style="width:100%; margin-bottom:20px;">
                    <option value="master">Мастер / Самозанятый</option>
                    <option value="company">Компания / ИП</option>
                    <option value="warehouse">Склад / Производство</option>
                </select>
            </div>
            <div class="settings-section">
                <h4>Валюта</h4>
                <select id="currencySelect" style="width:100%; margin-bottom:20px;">
                    <option value="RUB">₽ Российский рубль</option>
                    <option value="USD">$ Доллар США</option>
                    <option value="EUR">€ Евро</option>
                    <option value="BYN">Br Белорусский рубль</option>
                </select>
            </div>
			            <div class="settings-section">
                <h4>Статусы клиентов</h4>
                <div id="statusesList"></div>
                <button class="btn-secondary" onclick="openNewStatusModal()" style="margin-top: 8px;">+ Добавить статус</button>
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeSettingsModal()">Отмена</button>
                <button class="btn-confirm" onclick="saveSettings()">Применить</button>
            </div>
        </div>
    </div>

    <!-- Универсальное модальное окно -->
    <div id="dynamicModal" class="modal-overlay">
        <div class="modal-window">
            <h3 id="dynamicModalTitle">Введите значение</h3>
            <div id="dynamicModalBody"></div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeDynamicModal()">Отмена</button>
                <button class="btn-confirm" onclick="confirmDynamicModal()">Подтвердить</button>
            </div>
        </div>
    </div>

    <div id="notificationContainer"></div>

    <script>
        let currentProfile = 'master';
        let currentTab = 'dashboard';
        let clients = [], services = [], operations = [], products = [], operationsCount = 0, totalOps = 0;
        
        let dynamicModalResolve = null;

        function showNotification(message, isError = false) {
            const container = document.getElementById('notificationContainer');
            const notif = document.createElement('div');
            notif.className = `notification ${isError ? 'error' : 'success'}`;
            notif.textContent = message;
            container.appendChild(notif);
            setTimeout(() => notif.remove(), 2000);
        }

        function openModal(title, bodyHtml, callback) {
            document.getElementById('dynamicModalTitle').textContent = title;
            document.getElementById('dynamicModalBody').innerHTML = bodyHtml;
            dynamicModalResolve = callback;
            document.getElementById('dynamicModal').classList.add('active');
        }

        function closeDynamicModal() {
            document.getElementById('dynamicModal').classList.remove('active');
            dynamicModalResolve = null;
        }

        function confirmDynamicModal() {
            if (dynamicModalResolve) dynamicModalResolve();
            closeDynamicModal();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function updateProfileBadge() {
            const badge = document.getElementById('profileBadge');
            const names = { master: 'Мастер', company: 'Компания', warehouse: 'Склад' };
            badge.textContent = names[currentProfile] || '';
            badge.className = `badge badge-${currentProfile}`;
        }

        function getNavItems() {
            const common = [
                { id: 'dashboard', icon: '🏠', label: 'Дашборд' },
                { id: 'add', icon: '➕', label: 'Добавить' },
                { id: 'clients', icon: '👥', label: 'Клиенты' }
            ];
            const profileItems = {
                master: [{ id: 'services', icon: '💅', label: 'Услуги' }, { id: 'operations', icon: '📋', label: 'Операции' }],
                company: [{ id: 'products', icon: '📦', label: 'Товары' }, { id: 'operations', icon: '📋', label: 'Продажи' }],
                warehouse: [{ id: 'products', icon: '📦', label: 'Товары' }, { id: 'inventory', icon: '🏪', label: 'Склад' }, { id: 'operations', icon: '📋', label: 'Операции' }]
            };
            return [...common, ...(profileItems[currentProfile] || [])];
        }

                function switchTab(tabId) {
            currentTab = tabId;
            if (tabId === 'settings') {
                openSettingsModal();
                return;
            }
            loadCurrentTab();
            // Обновляем активный пункт в боковом меню
            document.querySelectorAll('.sidebar-item').forEach(item => {
                if (item.dataset.tab === tabId) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        async function loadCurrentTab() {
            const container = document.getElementById('mainContent');
            switch (currentTab) {
                case 'dashboard': await loadDashboard(container); break;
                case 'add': await loadAddForm(container); break;
                case 'clients': await loadClientsList(container); break;
                case 'services': await loadServicesList(container); break;
                case 'products': await loadProductsList(container); break;
                case 'operations': await loadOperationsList(container); break;
                case 'inventory': await loadInventory(container); break;
                default: await loadDashboard(container);
            }
        }

                async function loadDashboard(container) {
            await loadStats();
            const stats = await fetch('/api/stats').then(r => r.json());
            const remaining = 50 - totalOps;
            const percent = (totalOps / 50) * 100;
            
            // Получаем данные для графиков
            const chartData = await fetch('/api/charts').then(r => r.json());
            
            container.innerHTML = `
                <div class="card">
                    <div class="income">${formatPrice(stats.totalIncome)}</div>
                    <div>доход за месяц</div>
                </div>
                <div class="card">
                    <div style="font-weight:600; margin-bottom:8px;">Осталось операций: ${remaining} / 50</div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${percent}%;"></div></div>
                    ${totalOps >= 45 ? '<div class="warning-text">⚠️ Лимит скоро закончится. Перейдите на Pro</div>' : ''}
                </div>
                
                <!-- График дохода по дням -->
                <div class="card">
                    <div class="section-title">📈 Доход по дням (текущий месяц)</div>
                    <canvas id="incomeChart" style="width:100%; max-height: 250px;"></canvas>
                </div>
                
                <div style="display: flex; gap: 16px; flex-wrap: wrap;">
                    <!-- Круговая диаграмма топ-клиентов -->
                    <div class="card" style="flex: 1;">
                        <div class="section-title">🥧 Топ-5 клиентов</div>
                        <canvas id="clientsPieChart" style="width:100%; max-height: 250px;"></canvas>
                    </div>
                    
                    <!-- Гистограмма по дням недели -->
                    <div class="card" style="flex: 1;">
                        <div class="section-title">📊 Доход по дням недели</div>
                        <canvas id="weekdayBarChart" style="width:100%; max-height: 250px;"></canvas>
                    </div>
                </div>
                
                <div class="card">
                    <div class="section-title">🏆 Топ-10 клиентов</div>
                    ${stats.topClients.map(c => `<div><strong>${escapeHtml(c.name)}</strong>: ${formatPrice(c.total)} (${c.percent.toFixed(1)}%)</div>`).join('') || 'Нет данных'}
                </div>
                <div class="card">
                    <div class="section-title">⚠️ Напоминания</div>
                    ${stats.reminders.map(r => `<div>⚠️ ${escapeHtml(r.name)} не был ${r.days} дней</div>`).join('') || 'Все активны'}
                </div>
                <div class="card">
                    <div class="section-title">🧠 Совет нейросети</div>
                    <div>${stats.aiAdvice}</div>
                    <div class="ai-note">📌 Анализируем время операций, находим 2-часовой интервал с наименьшей загрузкой и рекомендуем запустить скидку для новых клиентов.</div>
                </div>
            `;
            
            // Рисуем графики после того, как они появились в DOM
            setTimeout(() => {
                drawIncomeChart(chartData.dailyIncome);
                drawPieChart(chartData.topClients);
                drawBarChart(chartData.weekdayIncome);
            }, 100);
        }

        async function loadAddForm(container) {
            await loadClientsData();
            let itemsHtml = '';
            if (currentProfile === 'master') {
                await loadServicesData();
                itemsHtml = `
                    <select id="itemSelectAdd">
                        <option value="">-- Выберите услугу --</option>
                        ${services.map(s => `<option value="${s.id}" data-price="${s.price}">${escapeHtml(s.name)} - ${formatPrice(s.price)}</option>`).join('')}
                    </select>
                    <button class="btn-secondary" onclick="openNewServiceModal()">Новая услуга</button>
                `;
            } else {

        async function loadOperationsList(container) {
            await loadOperationsData();
            await loadStats();
            
            let filterType = 'all';
            let customStart = null;
            let customEnd = null;
            
            function filterOperations() {
                const now = new Date();
                const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                const yesterday = new Date(today);
                yesterday.setDate(yesterday.getDate() - 1);
                
                let weekStart = new Date(today);
                const day = weekStart.getDay();
                weekStart.setDate(today.getDate() - (day === 0 ? 6 : day - 1));
                
                const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
                
                return operations.filter(op => {
                    const opDate = new Date(op.date);
                    
                    switch (filterType) {
                        case 'today': return opDate >= today;
                        case 'yesterday': return opDate >= yesterday && opDate < today;
                        case 'week': return opDate >= weekStart;
                        case 'month': return opDate >= monthStart;
                        case 'custom':
                            if (customStart && opDate < customStart) return false;
                            if (customEnd && opDate > customEnd) return false;
                            return true;
                        default: return true;
                    }
                });
            }
            
            function getFilteredTotal(filteredOps) {
                return filteredOps.reduce((sum, op) => sum + op.amount, 0);
            }
            
            function renderFilteredList() {
                const filtered = filterOperations();
                const total = getFilteredTotal(filtered);
                const sorted = [...filtered].sort((a, b) => new Date(b.date) - new Date(a.date));
                
                const filteredContainer = document.getElementById('filteredOperationsList');
                if (filteredContainer) {
                    filteredContainer.innerHTML = sorted.map(op => `
                        <div class="operation-row">
                            <div>
                                <div><strong>${escapeHtml(op.clientName)}</strong> — ${escapeHtml(op.serviceName || op.productName)}</div>
                                <div>💰 ${formatPrice(op.amount)}</div>
                                <div class="operation-date">📅 ${new Date(op.date).toLocaleDateString()}</div>
                            </div>
                            <div>
                                <button class="edit-btn" onclick="editOperation(${op.id})">✎</button>
                                <button class="delete-btn" onclick="deleteOperation(${op.id})">✕</button>
                            </div>
                        </div>
                    `).join('') || '<div style="text-align:center; padding:20px;">Нет операций за выбранный период</div>';
                }
                
                const totalElement = document.getElementById('filteredTotal');
                if (totalElement) {
                    totalElement.innerHTML = `💰 ${formatPrice(total)}`;
                }
            }
            
            function setFilter(type, start = null, end = null) {
                filterType = type;
                customStart = start;
                customEnd = end;
                
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.filter === type) btn.classList.add('active');
                });
                
                renderFilteredList();
            }
            
            const remaining = 50 - totalOps;
            const percent = (totalOps / 50) * 100;
            
            container.innerHTML = `
                <div class="card">
                    <div style="font-weight:600; margin-bottom:8px;">Осталось операций: ${remaining} / 50</div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${percent}%;"></div></div>
                    ${totalOps >= 45 ? '<div class="warning-text">⚠️ Лимит скоро закончится</div>' : ''}
                </div>
                <div class="card">
                    <div class="section-title">Фильтр по дате</div>
                    <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;">
                        <button class="filter-btn" data-filter="all" style="flex:1; margin:0;">Все</button>
                        <button class="filter-btn" data-filter="today" style="flex:1; margin:0;">Сегодня</button>
                        <button class="filter-btn" data-filter="yesterday" style="flex:1; margin:0;">Вчера</button>
                        <button class="filter-btn" data-filter="week" style="flex:1; margin:0;">Эта неделя</button>
                        <button class="filter-btn" data-filter="month" style="flex:1; margin:0;">Этот месяц</button>
                    </div>
                    <div style="display: flex; gap: 12px; align-items: flex-end;">
                        <div style="flex:1;">
                            <label style="font-size: 12px; opacity: 0.7; margin-bottom: 4px; display: block;">С</label>
                            <input type="date" id="customStartDate" style="width:100%; padding: 10px; border-radius: 10px; font-family: 'Rubik', sans-serif; font-size: 14px; background-color: #2a2a30; border: 1px solid #3a3a40; color: #ededee;">
                        </div>
                        <div style="flex:1;">
                            <label style="font-size: 12px; opacity: 0.7; margin-bottom: 4px; display: block;">По</label>
                            <input type="date" id="customEndDate" style="width:100%; padding: 10px; border-radius: 10px; font-family: 'Rubik', sans-serif; font-size: 14px; background-color: #2a2a30; border: 1px solid #3a3a40; color: #ededee;">
                        </div>
                        <button id="applyCustomBtn" class="btn-secondary" style="flex:0; margin:0; padding: 10px 20px;">Применить</button>
                    </div>
                </div>
                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                        <div class="section-title" style="margin-bottom:0;">История операций</div>
                        <div style="font-size: 18px; font-weight: 700; color: #10b981;" id="filteredTotal">0 ₽</div>
                    </div>
                    <div id="filteredOperationsList"></div>
                </div>
            `;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.onclick = () => setFilter(btn.dataset.filter);
            });
            
            document.getElementById('applyCustomBtn').onclick = () => {
                const startDate = document.getElementById('customStartDate').value;
                const endDate = document.getElementById('customEndDate').value;
                setFilter('custom', startDate ? new Date(startDate) : null, endDate ? new Date(endDate + 'T23:59:59') : null);
            };
            
            function updateCalendarStyles() {
                const isLight = document.body.classList.contains('light');
                const startInput = document.getElementById('customStartDate');
                const endInput = document.getElementById('customEndDate');
                if (startInput) {
                    startInput.style.backgroundColor = isLight ? '#ffffff' : '#2a2a30';
                    startInput.style.borderColor = isLight ? '#d4d8dd' : '#3a3a40';
                    startInput.style.color = isLight ? '#1a1a2e' : '#ededee';
                }
                if (endInput) {
                    endInput.style.backgroundColor = isLight ? '#ffffff' : '#2a2a30';
                    endInput.style.borderColor = isLight ? '#d4d8dd' : '#3a3a40';
                    endInput.style.color = isLight ? '#1a1a2e' : '#ededee';
                }
            }
            
            const observer = new MutationObserver(() => updateCalendarStyles());
            observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });
            
            if (typeof loadCurrencyRates === 'function') await loadCurrencyRates();
            updateCalendarStyles();
            setFilter('all');
        }

            });
        }

                function openNewClientModal() {
            const html = `
                <label>Имя</label><input type="text" id="newClientName" placeholder="Введите имя">
                <label>Телефон</label><input type="text" id="newClientPhone" placeholder="+7 XXX XXX-XX-XX">
                <label>Примечания</label><textarea id="newClientNotes" rows="2" placeholder="Дополнительная информация"></textarea>
                <label>Тип</label>
                <select id="newClientType">
                    <option value="person">Физ. лицо</option>
                    <option value="company">Компания / ИП</option>
                </select>
                <label>Статус</label>
<select id="newClientStatus">
    ${getStatusOptions('Новый')}
</select>
            `;
            
            openModal('Новый клиент', html, async () => {
                const name = document.getElementById('newClientName').value;
                const phone = document.getElementById('newClientPhone').value;
                const notes = document.getElementById('newClientNotes').value;
                const type = document.getElementById('newClientType').value;
                const status = document.getElementById('newClientStatus').value;
                
                if (!name) {
                    showNotification('Введите имя', true);
                    return;
                }
                
                await fetch('/api/clients', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, phone, notes, type, status })
                });
                
                await loadClientsData();
                loadCurrentTab();
                showNotification('Клиент добавлен');
            });
        }

        function openNewServiceModal() {
            const html = `
                <label>Название услуги</label><input type="text" id="newServiceName" placeholder="Например: Маникюр">
                <label>Цена (₽)</label><input type="number" id="newServicePrice" placeholder="3000">
            `;
            openModal('Новая услуга', html, async () => {
                const name = document.getElementById('newServiceName').value;
                const price = parseInt(document.getElementById('newServicePrice').value);
                if (!name) { showNotification('Введите название', true); return; }
                if (isNaN(price)) { showNotification('Введите цену', true); return; }
                await fetch('/api/services', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, price })
                });
                await loadServicesData();
                loadCurrentTab();
                showNotification('Услуга добавлена');
            });
        }

        function openNewProductModal() {
            const html = `
                <label>Название товара</label><input type="text" id="newProductName" placeholder="Например: Фильтр масляный">
                <label>Цена (₽)</label><input type="number" id="newProductPrice" placeholder="450">
                <label>Остаток на складе (шт.)</label><input type="number" id="newProductStock" placeholder="0" value="0">
            `;
            openModal('Новый товар', html, async () => {
                const name = document.getElementById('newProductName').value;
                const price = parseInt(document.getElementById('newProductPrice').value);
                const stock = parseInt(document.getElementById('newProductStock').value) || 0;
                if (!name) { showNotification('Введите название', true); return; }
                if (isNaN(price)) { showNotification('Введите цену', true); return; }
                await fetch('/api/products', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, price, stock })
                });
                await loadProductsData();
                loadCurrentTab();
                showNotification('Товар добавлен');
            });
        }

        function openSettingsModal() {
            document.getElementById('settingsModal').classList.add('active');
            loadSettingsToModal();
        }

        function closeSettingsModal() {
            document.getElementById('settingsModal').classList.remove('active');
        }

        async function loadSettingsToModal() {
            const res = await fetch('/api/settings');
            const s = await res.json();
            document.getElementById('profileSelect').value = s.role || 'master';
            document.getElementById('currencySelect').value = s.currency || 'RUB';
        }

        async function saveSettings() {
            const profile = document.getElementById('profileSelect').value;
            const currency = document.getElementById('currencySelect').value;
            await fetch('/api/settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ role: profile, currency: currency })
            });
            currentProfile = profile;
            currentCurrency = currency;
            localStorage.setItem('currency', currency);
            updateProfileBadge();
            closeSettingsModal();
            await loadCurrentTab();
            showNotification('Настройки сохранены');
        }

        let currentCurrency = 'RUB';
        let currencyRates = { RUB: 1, USD: 0, EUR: 0, BYN: 0 };

        async function loadCurrencyRates() {
            try {
                const res = await fetch('/api/currency/rates');
                const data = await res.json();
                currencyRates = data;
            } catch (error) {
                console.error('Ошибка загрузки курсов:', error);
            }
        }

        function convertPrice(priceInRUB) {
            const rate = currencyRates[currentCurrency];
            if (!rate || rate === 0) return priceInRUB;
            return Math.round(priceInRUB * rate);
        }

        function formatPrice(priceInRUB) {
            const converted = convertPrice(priceInRUB);
            const symbols = { RUB: '₽', USD: '$', EUR: '€', BYN: 'Br' };
            return `${converted.toLocaleString()} ${symbols[currentCurrency]}`;
        }

        function toggleTheme() {
            const isLight = document.body.classList.contains('light');
            if (isLight) {
                document.body.classList.remove('light');
                localStorage.setItem('theme', 'dark');
                document.getElementById('themeToggleBtn').textContent = '🌙';
            } else {
                document.body.classList.add('light');
                localStorage.setItem('theme', 'light');
                document.getElementById('themeToggleBtn').textContent = '☀️';
            }
            fetch('/api/settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ theme: localStorage.getItem('theme') })
            }).catch(console.error);
        }

        function getStatusLabel(status) {
            const labels = {
                'new': '🆕 Новый',
                'negotiation': '💬 В переговорах',
                'regular': '⭐ Постоянный',
                'inactive': '💤 Неактивный',
                'departed': '❌ Ушедший'
            };
            return labels[status] || '🆕 Новый';
        }

        // Функции для бокового меню
        function openSidebar() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('sidebarOverlay').classList.add('open');
        }
        
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('open');
        }
        
                function initSidebar() {
            document.querySelectorAll('.sidebar-item').forEach(item => {
                item.onclick = () => {
                    const tabId = item.dataset.tab;
                    if (tabId) {
                        if (tabId !== 'settings') {
                            closeSidebar();
                        }
                        switchTab(tabId);
                    }
                };
            });
            document.getElementById('menuToggleBtn').onclick = openSidebar;
        }

        async function init() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light');
                document.getElementById('themeToggleBtn').textContent = '☀️';
            }
            
            await loadCurrencyRates();
            await loadStatuses();           // ← уже есть
            await renderStatusesList();     // ← ДОБАВИТЬ ЭТУ СТРОКУ
            
            const res = await fetch('/api/settings');
            const s = await res.json();
            currentProfile = s.role || 'master';
            currentCurrency = s.currency || 'RUB';
            updateProfileBadge();
            
            initSidebar();
            
            await loadCurrentTab();
        }

        // Обработка клавиши Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                // Закрыть боковое меню, если открыто
                const sidebar = document.getElementById('sidebar');
                if (sidebar && sidebar.classList.contains('open')) {
                    closeSidebar();
                }
                // Закрыть модальное окно, если открыто
                const modal = document.getElementById('dynamicModal');
                if (modal && modal.classList.contains('active')) {
                    closeDynamicModal();
                }
                // Закрыть окно настроек, если открыто
                const settingsModal = document.getElementById('settingsModal');
                if (settingsModal && settingsModal.classList.contains('active')) {
                    closeSettingsModal();
                }
            }
        });

        // График дохода по дням
        let incomeChartInstance = null;
        function drawIncomeChart(dailyData) {
            const ctx = document.getElementById('incomeChart')?.getContext('2d');
            if (!ctx) return;
            if (incomeChartInstance) incomeChartInstance.destroy();
            
            const days = dailyData.map(d => d.day);
            const values = dailyData.map(d => convertPrice(d.total));
            
            incomeChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: days,
                    datasets: [{
                        label: `Доход (${getCurrencySymbol()})`,
                        data: values,
                        borderColor: '#10b981',
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.3,
                        pointRadius: 4,
                        pointBackgroundColor: '#10b981'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { position: 'top' },
                        tooltip: { callbacks: { label: (ctx) => `${ctx.raw.toLocaleString()} ${getCurrencySymbol()}` } }
                    },
                    scales: {
                        y: { beginAtZero: true, ticks: { callback: (val) => val.toLocaleString() } }
                    }
                }
            });
        }
        
        // Круговая диаграмма топ-клиентов
        let pieChartInstance = null;
        function drawPieChart(topClients) {
            const ctx = document.getElementById('clientsPieChart')?.getContext('2d');
            if (!ctx) return;
            if (pieChartInstance) pieChartInstance.destroy();
            
            if (topClients.length === 0) {
                ctx.fillStyle = '#666';
                ctx.fillRect(0, 0, ctx.canvas.width, ctx.canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = '14px Rubik';
                ctx.fillText('Нет данных', 10, 50);
                return;
            }
            
            pieChartInstance = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: topClients.map(c => c.name),
                    datasets: [{
                        data: topClients.map(c => convertPrice(c.total)),
                        backgroundColor: ['#10b981', '#3b82f6', '#f59e0b', '#ef4444', '#8b5cf6', '#ec489a', '#06b6d4', '#84cc16', '#f97316', '#6366f1'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { position: 'right', labels: { font: { size: 10 } } },
                        tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${ctx.raw.toLocaleString()} ${getCurrencySymbol()}` } }
                    }
                }
            });
        }
        
        // Гистограмма по дням недели
        let barChartInstance = null;
        function drawBarChart(weekdayData) {
            const ctx = document.getElementById('weekdayBarChart')?.getContext('2d');
            if (!ctx) return;
            if (barChartInstance) barChartInstance.destroy();
            
            const weekdays = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
            const values = weekdays.map(day => convertPrice(weekdayData[day] || 0));
            
            barChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: weekdays,
                    datasets: [{
                        label: `Доход (${getCurrencySymbol()})`,
                        data: values,
                        backgroundColor: '#10b981',
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { position: 'top' },
                        tooltip: { callbacks: { label: (ctx) => `${ctx.raw.toLocaleString()} ${getCurrencySymbol()}` } }
                    },
                    scales: {
                        y: { beginAtZero: true, ticks: { callback: (val) => val.toLocaleString() } }
                    }
                }
            });
        }
        
        function getCurrencySymbol() {
            const symbols = { RUB: '₽', USD: '$', EUR: '€', BYN: 'Br' };
            return symbols[currentCurrency] || '₽';
        }
		
		        let statuses = [];

        async function loadStatuses() {
            try {
                const res = await fetch('/api/statuses');
                statuses = await res.json();
            } catch (error) {
                console.error('Ошибка загрузки статусов:', error);
                // Статусы по умолчанию, если сервер не ответил
                statuses = [
                    { id: 1, name: 'Новый', color: '#3b82f6' },
                    { id: 2, name: 'В переговорах', color: '#f59e0b' },
                    { id: 3, name: 'Постоянный', color: '#10b981' },
                    { id: 4, name: 'Неактивный', color: '#6b7280' },
                    { id: 5, name: 'Ушедший', color: '#ef4444' }
                ];
            }
        }

        function getStatusColor(statusName) {
            const status = statuses.find(s => s.name === statusName);
            return status ? status.color : '#6b7280';
        }

        function getStatusLabel(statusName) {
            const status = statuses.find(s => s.name === statusName);
            return status ? status.name : 'Новый';
        }

        function getStatusOptions(selectedStatus) {
            return statuses.map(s => `<option value="${s.name}" ${selectedStatus === s.name ? 'selected' : ''}>${s.name}</option>`).join('');
        }
		
		        async function renderStatusesList() {
            const container = document.getElementById('statusesList');
            if (!container) return;
            if (statuses.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:10px;">Нет статусов</div>';
                return;
            }
            container.innerHTML = statuses.map(s => `
                <div class="client-row" style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <span style="display: inline-block; width: 12px; height: 12px; border-radius: 50%; background-color: ${s.color}; margin-right: 8px;"></span>
                        ${escapeHtml(s.name)}
                    </div>
                    <div>
                        <button class="edit-btn" onclick="editStatus(${s.id})">✎</button>
                        <button class="delete-btn" onclick="deleteStatus(${s.id})">✕</button>
                    </div>
                </div>
            `).join('');
        }

        async function openNewStatusModal() {
            const html = `
                <label>Название статуса</label>
                <input type="text" id="newStatusName" placeholder="Например: VIP клиент">
                <label>Цвет (HEX)</label>
                <input type="color" id="newStatusColor" value="#10b981">
            `;
            openModal('Новый статус', html, async () => {
                const name = document.getElementById('newStatusName').value;
                const color = document.getElementById('newStatusColor').value;
                if (!name) {
                    showNotification('Введите название статуса', true);
                    return;
                }
                await fetch('/api/statuses', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, color })
                });
                await loadStatuses();
                await renderStatusesList();
                await loadClientsData();
                loadCurrentTab();
                showNotification('Статус добавлен');
            });
        }

        async function editStatus(id) {
            const status = statuses.find(s => s.id === id);
            if (!status) return;
            const html = `
                <label>Название статуса</label>
                <input type="text" id="editStatusName" value="${escapeHtml(status.name)}">
                <label>Цвет (HEX)</label>
                <input type="color" id="editStatusColor" value="${status.color}">
            `;
            openModal('Редактировать статус', html, async () => {
                const name = document.getElementById('editStatusName').value;
                const color = document.getElementById('editStatusColor').value;
                if (!name) {
                    showNotification('Введите название статуса', true);
                    return;
                }
                await fetch('/api/statuses', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, name, color })
                });
                await loadStatuses();
                await renderStatusesList();
                await loadClientsData();
                loadCurrentTab();
                showNotification('Статус обновлён');
            });
        }

        async function deleteStatus(id) {
            const status = statuses.find(s => s.id === id);
            if (!status) return;
            if (confirm(`Удалить статус "${status.name}"?`)) {
                await fetch(`/api/statuses/${id}`, { method: 'DELETE' });
                await loadStatuses();
                await renderStatusesList();
                await loadClientsData();
                loadCurrentTab();
                showNotification('Статус удалён');
            }
        }

        init();
    </script>
</body>
</html>
